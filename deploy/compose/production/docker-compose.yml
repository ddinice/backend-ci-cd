name: production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_production:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  app-service:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${APP_PUBLIC_PORT:-3022}:3022'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      APP_SERVICE_PORT: '3022'
      PAYMENTS_GRPC_URL: ${PAYMENTS_GRPC_URL:-127.0.0.1:5022}

volumes:
  pgdata_production:
