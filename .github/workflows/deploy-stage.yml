name: Deploy Stage

on:
  workflow_run:
    workflows:
      - Build and Stage
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_override:
        description: Full image ref (optional). If empty, image is derived from commit SHA.
        required: false
        type: string

concurrency:
  group: deploy-stage
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy-stage:
    name: Deploy to stage (DO + Compose)
    runs-on: ubuntu-latest
    environment: stage
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'develop'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve container image
        id: image
        env:
          IMAGE_OVERRIDE: ${{ github.event.inputs.image_override }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${IMAGE_OVERRIDE}" ]; then
            echo "image=${IMAGE_OVERRIDE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          SHORT="${SHA:0:7}"
          if [ -z "$DOCKER_USER" ]; then
            echo "::error::DOCKERHUB_USERNAME secret is required to resolve image tag."
            exit 1
          fi
          echo "image=${DOCKER_USER}/app-service:sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Write Compose .env
        env:
          APP_IMAGE: ${{ steps.image.outputs.image }}
          DB_USER: ${{ secrets.STAGE_DB_USER }}
          DB_PASS: ${{ secrets.STAGE_DB_PASS }}
          DB_NAME: ${{ secrets.STAGE_DB_NAME }}
          PAYMENTS_GRPC_URL: ${{ secrets.STAGE_PAYMENTS_GRPC_URL }}
          APP_PUBLIC_PORT: ${{ vars.STAGE_APP_PUBLIC_PORT }}
        run: |
          if [ -z "$DB_USER" ] || [ -z "$DB_PASS" ] || [ -z "$DB_NAME" ]; then
            echo "::error::Set STAGE_DB_USER, STAGE_DB_PASS, STAGE_DB_NAME on Environment 'stage'."
            exit 1
          fi
          PORT="${APP_PUBLIC_PORT:-3022}"
          PAY="${PAYMENTS_GRPC_URL:-127.0.0.1:5022}"
          {
            echo "APP_IMAGE=$APP_IMAGE"
            echo "APP_PUBLIC_PORT=$PORT"
            echo "DB_USER=$DB_USER"
            echo "DB_PASS=$DB_PASS"
            echo "DB_NAME=$DB_NAME"
            echo "PAYMENTS_GRPC_URL=$PAY"
          } > deploy/compose/stage/.env

      - name: Bundle files for Droplet
        run: |
          mkdir -p .stage-bundle
          cp deploy/compose/stage/docker-compose.yml .stage-bundle/
          cp deploy/compose/stage/.env .stage-bundle/
          cp deploy/scripts/deploy-stage-compose-remote.sh .stage-bundle/deploy.sh
          chmod +x .stage-bundle/deploy.sh
          tar -czf stage-bundle.tgz -C .stage-bundle .

      - name: Copy bundle to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGE_DROPLET_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_PRIVATE_KEY }}
          port: 22
          source: stage-bundle.tgz
          target: /opt/stage
          overwrite: true

      - name: Deploy on Droplet (extract, pull, up)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.STAGE_DROPLET_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_PRIVATE_KEY }}
          port: 22
          envs: DOCKER_USER,DOCKER_PASS
          script: |
            set -e
            mkdir -p /opt/stage
            cd /opt/stage
            tar -xzf stage-bundle.tgz
            rm -f stage-bundle.tgz
            chmod +x deploy.sh
            echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
            STAGE_DEPLOY_DIR=/opt/stage bash /opt/stage/deploy.sh

      - name: Post-deploy smoke (on Droplet)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_DROPLET_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            PORT="${{ vars.STAGE_APP_PUBLIC_PORT }}"
            PORT="${PORT:-3022}"
            curl -fsS "http://127.0.0.1:${PORT}/health" | grep -q '"status":"ok"'
            curl -fsS "http://127.0.0.1:${PORT}/orders" | grep -q '\['
            echo "smoke OK"
