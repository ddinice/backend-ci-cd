name: PR Checks

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  pr-checks:
    name: PR Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      bundle_name: ${{ steps.meta.outputs.bundle_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      release_label: ${{ steps.meta.outputs.release_label }}
      target_environment: ${{ steps.meta.outputs.target_environment }}
      run_smoke: ${{ steps.flags.outputs.run_smoke }}
      strict_policy: ${{ steps.flags.outputs.strict_policy }}
      publish_bundle: ${{ steps.flags.outputs.publish_bundle }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Run Smoke Tests
        run: npm run test:smoke

      - name: Build Project
        run: npm run build

      - name: Docker build validation
        run: docker build -t app-service:test .