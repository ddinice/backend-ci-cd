name: PR Checks

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  pr-checks:
    name: PR Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Smoke tests (HTTP)
        run: npm run test:smoke

      - name: Migration and schema check
        env:
          NODE_ENV: example
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: postgres
        run: npm run db:check

      - name: Build
        run: npm run build

      - name: Docker build validation
        run: docker build -t app-service:ci .
